<!-- index.html -->
<!doctype html>
<html>
<head><meta charset="utf-8"><title>Add two numbers</title></head>
<body>
  <input id="a" type="number" placeholder="First number">
  <input id="b" type="number" placeholder="Second number">
  <button id="go">Add</button>
  <div id="out"></div>
<script>
document.getElementById('go').onclick = () => {
  const a = Number(document.getElementById('a').value);
  const b = Number(document.getElementById('b').value);
  document.getElementById('out').textContent = 'Result: ' + (a + b);
};
</script>
</body>
</html>
